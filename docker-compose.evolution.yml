# Evolution API — servidor WhatsApp (rode em VPS, não na Vercel)
# Uso: docker compose -f docker-compose.evolution.yml up -d
#
# Depois configure no .env da Vercel:
#   EVOLUTION_API_URL=https://seu-servidor:8080
#   EVOLUTION_API_KEY=mesma-chave-abaixo
#   NEXT_PUBLIC_APP_URL=https://horadafesta.vercel.app

services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: horadafesta-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://localhost:8080}
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-horadafesta-secret-key}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL:-postgresql://evolution:evolution@postgres:5432/evolution}
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      WEBHOOK_GLOBAL_ENABLED: "false"
      CONFIG_SESSION_PHONE_CLIENT: "Hora da Festa CRM"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
    depends_on:
      - postgres
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:15-alpine
    container_name: horadafesta-evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg:/var/lib/postgresql/data

volumes:
  evolution_instances:
  evolution_pg:
